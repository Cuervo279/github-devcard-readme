name: Update RPG

on:
  push:
    branches:
      - main        # Adicione isso para rodar no commit
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update Stats
        run: node scripts/updateStats.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Card
        run: node scripts/generateCard.js

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # O [skip ci] evita que o commit do próprio bot dispare o workflow de novo
          git commit -m "update rpg stats [skip ci]" || echo "no changes"
          git push
